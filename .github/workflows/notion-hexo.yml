name: Notion to Hexo Auto Sync

on:
  schedule:
    # 每天北京时间晚上 8 点自动跑一次 (UTC时间 12 点)
    - cron: '0 12 * * *' 
  workflow_dispatch: # 允许你在 GitHub 网页上手动点按钮触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码 (Checkout)
        uses: actions/checkout@v3

      - name: 2. 配置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 安装依赖包
        run: pip install notion-client notion2md

      - name: 4. 执行同步脚本 🚀
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python scripts/sync.py

      - name: 5. 提交并触发 Vercel 构建
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add source/_posts/
          # 如果有新文章就 commit，没有就不管
          git commit -m "docs: 🤖 Auto sync posts from Notion" || echo "No changes to commit"
          git push